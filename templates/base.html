<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Ice Hockey Analytics{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f8fafc;
        }

        header h1 a {
            color: inherit;
            text-decoration: none;
        }

        header .subtitle {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        a { color: #60a5fa; }
        a:hover { color: #93bbfd; }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 0.75rem;
            color: #f1f5f9;
        }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-blue { background: #1e3a5f; color: #93c5fd; }
        .badge-green { background: #14532d; color: #86efac; }

        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    <header>
        <h1><a href="/">Ice Hockey Analytics</a></h1>
        <span class="subtitle">Shift TOI &amp; Scoring Chances</span>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
